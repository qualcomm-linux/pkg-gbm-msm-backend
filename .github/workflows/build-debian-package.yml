name: Build Debian Package
description: |
  Builds the debian package represented by this repo at the ref pointed by the debain-ref argument.

on:
  workflow_dispatch:
    inputs:

      debian-ref:
        description: The debian ref to build. For example branch "debian/qcom-next" or tag "debian/1.0.0-1"
        type: string
        required: true
        default: debian/qcom-next

      upstream-ref:
        description: The upstream ref to use for source code. For example "main" or a specific tag
        type: string
        required: true
        default: main

      distro-codename:
        description: The distribution codename to build for. Ex noble, questing, etc
        type: choice
        default: noble
        options:
          - noble
          - questing

      abi-checker:
        description: Run the ABI checker or not
        type: boolean
        default: false

      push-to-repo:
        description: Push to repository upon successful build
        type: boolean
        default: false

      builder_runner:
        type: choice
        default: ubuntu-latest
        options:
          - ubuntu-latest
          - lecore-prd-u2404-arm64-xlrg-od-ephem

permissions:
  contents: write

jobs:
  prepare-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Debian Packaging Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.debian-ref }}
          token: ${{ secrets.DEB_PKG_BOT_CI_TOKEN }}
          path: ./pkg-repo
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout Upstream Source Repository
        uses: actions/checkout@v4
        with:
          repository: qualcomm-linux/gbm-msm-backend
          ref: ${{ inputs.upstream-ref }}
          token: ${{ secrets.DEB_PKG_BOT_CI_TOKEN }}
          path: ./upstream-source
          fetch-depth: 0

      - name: Merge Upstream Source into Package Repository
        run: |
          cd pkg-repo

          # Configure git
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Copy upstream source files into the package repo
          # Exclude .git directory and .github directory from upstream
          rsync -av --exclude='.git' --exclude='.github' ../upstream-source/ ./

          # Add all changes
          git add -A

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit - source already up to date"
          else
            git commit -m "Merge upstream source from ${{ inputs.upstream-ref }}"
            git push origin ${{ inputs.debian-ref }}
          fi

  build:
    needs: prepare-and-build
    uses: qualcomm-linux/qcom-build-utils/.github/workflows/qcom-build-pkg-reusable-workflow.yml@main
    with:
      qcom-build-utils-ref: main
      debian-ref: ${{ inputs.debian-ref }}
      distro-codename: ${{ inputs.distro-codename }}
      run-abi-checker: ${{ inputs.abi-checker }}
      is-post-merge: ${{ inputs.push-to-repo }}
    secrets: inherit
